<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackTech Pro V6.5 - Blindado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --blue: #0f172a; --accent: #38bdf8; --green: #22c55e; --red: #ef4444; --dark: #020617; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: var(--blue); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #main-interface { display: none; width: 100%; height: 100%; }
        .sidebar { width: 250px; background: var(--blue); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo-side { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); background: var(--dark); font-weight: 900; color: var(--accent); }
        .tab-btn { width: 100%; padding: 15px 25px; border: none; background: none; color: #94a3b8; cursor: pointer; text-align: left; font-weight: bold; }
        .tab-btn.active { background: #1e293b; color: white; border-left: 4px solid var(--accent); }
        .content { flex: 1; overflow-y: auto; padding: 30px; position: relative; }
        .module { display: none; max-width: 1100px; margin: 0 auto; }
        .module.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; background: #f8fafc; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-blue { background: var(--accent); color: var(--blue); }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        #tasa-widget { position: absolute; top: 20px; right: 30px; background: white; padding: 8px 15px; border-radius: 30px; border: 1px solid #ddd; font-weight: bold; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 58mm; font-family: monospace; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--blue)">HACKTECH</h2>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn btn-blue" onclick="checkLogin()">Entrar</button>
        </div>
    </div>

    <div id="main-interface">
        <div id="tasa-widget">BCV: <span>446,80</span> Bs</div>
        <div class="sidebar">
            <div class="logo-side">HACKTECHNOLOGY</div>
            <button class="tab-btn active" onclick="showTab(event, 'vta')">🛒 Facturación</button>
            <button class="tab-btn" onclick="showTab(event, 'fiao')">👤 Deudores</button>
            <button class="tab-btn" onclick="showTab(event, 'caja')">📊 Cierre Diario</button>
            <button id="btn-inv-menu" class="tab-btn" onclick="showTab(event, 'inv')">📦 Inventario 🔒</button>
            <button class="tab-btn" style="margin-top: auto; color: #ef4444;" onclick="location.reload()">Cerrar Sesión</button>
        </div>

        <main class="content">
            <div id="vta" class="module active">
                <div class="card">
                    <h3>Punto de Venta</h3>
                    <div style="display: flex; gap: 10px;">
                        <select id="sel-pos" style="flex: 2;"></select>
                        <input type="number" id="cant-pos" value="1" style="flex: 0.5;">
                        <button class="btn btn-green" onclick="addToCart()" style="width: auto;">Añadir</button>
                    </div>
                    <table>
                        <thead><tr><th>Producto</th><th>Cant</th><th>Subtotal Bs</th><th>Acción</th></tr></thead>
                        <tbody id="cart-body"></tbody>
                    </table>
                    <div style="background: var(--blue); color: white; padding: 25px; border-radius: 12px; margin-top: 20px; display: flex; justify-content: space-between;">
                        <h2 id="totBs">0,00 Bs</h2>
                        <button class="btn btn-green" onclick="checkout(true)" style="width: auto;">Cobrar e Imprimir 🖨️</button>
                    </div>
                </div>
            </div>

            <div id="fiao" class="module">
                <div class="card">
                    <h3>Registro de Fiados</h3>
                    <input type="text" id="fCli" placeholder="Cliente">
                    <input type="number" id="fMon" placeholder="Monto Bs">
                    <button class="btn btn-blue" onclick="saveFiao()">Guardar Deuda</button>
                </div>
                <div class="card">
                    <table>
                        <thead><tr><th>Cliente</th><th>Monto Bs</th><th>Acción</th></tr></thead>
                        <tbody id="f-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="caja" class="module">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3>Ventas del Día</h3>
                        <button id="btn-cierre-pdf" class="btn btn-blue" onclick="descargarReportePDF()" style="width: auto;">PDF</button>
                    </div>
                    <tbody id="cierre-body"></tbody>
                    <h1 id="cierre-total" style="text-align:right;">0,00 Bs</h1>
                </div>
            </div>

            <div id="inv" class="module">
                <div class="card">
                    <h3>Panel Administrador: Inventario</h3>
                    <input type="text" id="iNom" placeholder="Nombre">
                    <input type="number" id="iBulto" placeholder="Bultos">
                    <input type="number" id="iUxb" placeholder="Und x Bulto">
                    <input type="number" id="iCostB" placeholder="Costo $ Bulto">
                    <button class="btn btn-blue" onclick="registrarInventario()">Guardar en Stock</button>
                </div>
                <div class="card">
                    <table id="inv-table">
                        <thead><tr><th>Producto</th><th>Total Und</th><th>Venta Bs</th><th>Acción</th></tr></thead>
                        <tbody id="lista-inv"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="print-area" style="display:none;"></div>

    <script>
        const TASA = 446.80;
        let currentUser = null;
        let db = JSON.parse(localStorage.getItem('ht_db')) || [];
        let sales = JSON.parse(localStorage.getItem('ht_sales')) || [];
        let deudores = JSON.parse(localStorage.getItem('ht_deudores')) || [];
        let cart = [];

        const fNum = (n) => n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            // CONFIGURACIÓN DE USUARIOS
            if(u === "admin" && p === "hack2026") currentUser = "admin";
            else if(u === "vendedor" && p === "1234") currentUser = "vendedor";

            if(currentUser) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-interface').style.display = 'flex';
                // Blindaje visual inicial
                if(currentUser !== "admin") {
                    document.getElementById('btn-inv-menu').style.opacity = '0.3';
                }
                renderAll();
            } else { alert("Error de acceso"); }
        }

        function showTab(e, id) {
            if(id === 'inv' && currentUser !== 'admin') {
                alert("Acceso denegado: Solo Administradores");
                return;
            }
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
            renderAll();
        }

        function renderAll() {
            // Tabla de Deudores con Blindaje de Botón de Borrado
            document.getElementById('f-body').innerHTML = deudores.map((d, i) => `
                <tr>
                    <td>${d.cli}</td>
                    <td>${fNum(d.mon)}</td>
                    <td>
                        ${currentUser === 'admin' ? 
                        `<button onclick="borrarDeuda(${i})" style="background:var(--green); color:white; border:none; border-radius:4px; padding:5px 10px; cursor:pointer;">✅ Pagado</button>` : 
                        `<span style="color:#94a3b8; font-size:0.8rem;">Solo Admin</span>`}
                    </td>
                </tr>`).join('');

            // Tabla Inventario con Blindaje de Borrado
            document.getElementById('lista-inv').innerHTML = db.map((p, i) => `
                <tr><td>${p.nom}</td><td>${p.totalUnd}</td><td>${fNum(p.pVentaU * TASA)}</td>
                <td>${currentUser === 'admin' ? `<span onclick="db.splice(${i},1);save();renderAll()" style="color:red; cursor:pointer;">✖</span>` : ''}</td></tr>`).join('');

            document.getElementById('sel-pos').innerHTML = db.map((p,i) => `<option value="${i}">${p.nom}</option>`).join('');
            
            let tot = 0;
            sales.forEach(s => tot += s.m);
            document.getElementById('cierre-total').innerText = fNum(tot) + " Bs";
        }

        function borrarDeuda(index) {
            if(confirm("¿Confirmar pago de esta deuda?")) {
                deudores.splice(index, 1);
                save();
                renderAll();
            }
        }

        // --- FUNCIONES BASE REQUERIDAS ---
        function save() { 
            localStorage.setItem('ht_db', JSON.stringify(db)); 
            localStorage.setItem('ht_sales', JSON.stringify(sales)); 
            localStorage.setItem('ht_deudores', JSON.stringify(deudores));
        }

        function saveFiao() {
            const cli = document.getElementById('fCli').value;
            const mon = parseFloat(document.getElementById('fMon').value);
            if(!cli || !mon) return;
            deudores.push({ cli, mon });
            save(); renderAll();
            document.getElementById('fCli').value = ""; document.getElementById('fMon').value = "";
        }

        function registrarInventario() {
            const nom = document.getElementById('iNom').value;
            const bultos = parseInt(document.getElementById('iBulto').value);
            const uxb = parseInt(document.getElementById('iUxb').value);
            const costB = parseFloat(document.getElementById('iCostB').value);
            if(!nom || !bultos) return;
            const totalUnd = bultos * uxb;
            const pVentaU = (costB / uxb) * 1.30;
            db.push({ nom, totalUnd, pVentaU });
            save(); renderAll(); alert("Guardado");
        }

        function addToCart() {
            const idx = document.getElementById('sel-pos').value;
            const cant = parseInt(document.getElementById('cant-pos').value) || 1;
            const p = db[idx];
            cart.push({ nom: p.nom, cant, sub: p.pVentaU * TASA * cant, id: idx });
            renderCart();
        }

        function renderCart() {
            let t = 0;
            document.getElementById('cart-body').innerHTML = cart.map((i, idx) => {
                t += i.sub;
                return `<tr><td>${i.nom}</td><td>${i.cant}</td><td>${fNum(i.sub)}</td><td onclick="cart.splice(${idx},1);renderCart()">✖</td></tr>`;
            }).join('');
            document.getElementById('totBs').innerText = fNum(t) + " Bs";
        }

        function checkout(print) {
            const t = cart.reduce((a, b) => a + b.sub, 0);
            if(t <= 0) return;
            sales.push({ h: new Date().toLocaleTimeString(), m: t });
            cart.forEach(c => { db[c.id].totalUnd -= c.cant; });
            save();
            if(print) {
                const pArea = document.getElementById('print-area');
                pArea.innerHTML = `<h3>Abastos El Imperio 22-29</h3><p>Cliente: General</p><hr>` + 
                    cart.map(i => `<div>${i.nom} x${i.cant}: ${fNum(i.sub)} Bs</div>`).join('') + 
                    `<hr><h4>TOTAL: ${fNum(t)} Bs</h4><p>¡Gracias por su compra!</p>`;
                window.print();
            }
            cart = []; renderCart(); renderAll();
        }

        function descargarReportePDF() {
            if(currentUser !== 'admin') { alert("Solo el administrador puede descargar reportes"); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Reporte HackTech", 15, 15);
            doc.autoTable({ head: [['Hora', 'Monto Bs']], body: sales.map(s => [s.h, fNum(s.m)]) });
            doc.save("Cierre.pdf");
        }

        function resetDay() {
            if(currentUser !== 'admin') return alert("Solo admin puede borrar el cierre");
            if(confirm("¿Borrar historial?")) { sales = []; save(); renderAll(); }
        }
    </script>
</body>
  </html>
