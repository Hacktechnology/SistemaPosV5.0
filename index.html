<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pos De Ventss Pro V8.7 - Official</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --blue: #0f172a; --accent: #38bdf8; --green: #22c55e; --red: #ef4444; --dark: #020617; --gray-border: #e2e8f0; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; color: #1e293b; }
        
        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--blue); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: var(--white); padding: 40px; border-radius: 16px; width: 340px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-card h2 { color: var(--blue); margin-bottom: 20px; font-weight: 800; }
        
        /* INTERFAZ */
        #main-interface { display: none; width: 100%; height: 100%; }
        .sidebar { width: 260px; background: var(--blue); color: #94a3b8; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo-side { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); background: var(--dark); font-weight: 900; color: var(--accent); }
        
        .tab-btn { width: 100%; padding: 16px 25px; border: none; background: none; color: inherit; cursor: pointer; text-align: left; font-weight: 600; }
        .tab-btn.active { background: rgba(255,255,255,0.05); color: var(--white); border-left: 4px solid var(--accent); }
        
        .content { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .module { display: none; max-width: 1100px; margin: 0 auto; }
        .module.active { display: block; }
        
        .card { background: var(--white); padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 30px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; gap: 15px; flex-wrap: wrap; }

        /* WIDGET TASA */
        #tasa-header { position: absolute; top: 15px; right: 40px; display: flex; align-items: center; gap: 8px; z-index: 100; }
        .tasa-box { background: var(--blue); color: var(--white); padding: 8px 15px; border-radius: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #tasa-input { width: 80px; background: transparent; border: none; color: var(--accent); font-size: 1.1rem; font-weight: 800; text-align: center; outline: none; }

        /* BOTONES */
        .btn-ui { padding: 10px 18px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-blue { background: var(--accent); color: var(--blue); }
        .btn-green { background: var(--green); color: var(--white); }
        .btn-red { background: var(--red); color: var(--white); }
        .btn-dark { background: #1e293b; color: var(--white); }
        .btn-group-top { display: flex; gap: 10px; align-items: center; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        input, select { padding: 12px; border-radius: 8px; border: 1px solid var(--gray-border); font-size: 0.95rem; width: 100%; box-sizing: border-box; }

        /* IMPRESION */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 58mm; font-family: 'Courier New', monospace; font-size: 11px; padding: 5px; color: #000; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>SISTEMAS DE VENTAS PRO</h2>
            <input type="text" id="user" placeholder="Usuario" style="margin-bottom:10px;">
            <input type="password" id="pass" placeholder="Contraseña" style="margin-bottom:15px;">
            <button class="btn-ui btn-blue" style="width: 100%; padding:15px;" onclick="checkLogin()">Entrar al Sistema</button>
        </div>
    </div>

    <div id="main-interface">
        <div id="tasa-header" class="no-print">
            <div class="tasa-box">
                <span style="font-size: 0.65rem; font-weight: 900;">BCV Bs</span>
                <input type="number" id="tasa-input" value="451.50" step="0.01">
            </div>
            <button class="btn-ui btn-blue" style="padding: 8px; border-radius: 10px;" onclick="fetchTasaBCV()">↻</button>
        </div>

        <div class="sidebar no-print">
            <div class="logo-side">SISTEMAS DE VENTAS PRO</div>
            <button class="tab-btn active" onclick="showTab(event, 'vta')">🛒 Facturación</button>
            <button class="tab-btn" onclick="showTab(event, 'fiao')">👤 Deudores</button>
            <button class="tab-btn" onclick="showTab(event, 'caja')">📊 Cierre Diario</button>
            <button id="btn-inv-menu" class="tab-btn" onclick="showTab(event, 'inv')">📦 Inventario 🔒</button>
            <button class="tab-btn" style="margin-top: auto; color: var(--red);" onclick="location.reload()">Cerrar Sesión</button>
        </div>

        <main class="content">
            <div id="vta" class="module active">
                <div class="card">
                    <div class="card-header"><h3>Punto de Venta</h3></div>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px;" class="no-print">
                        <select id="sel-pos" style="flex: 3;"></select>
                        <input type="number" id="cant-pos" value="1" style="flex: 1;">
                        <button class="btn-ui btn-green" onclick="addToCart()">Añadir</button>
                    </div>
                    <table>
                        <thead><tr><th>Producto</th><th>Cant</th><th style="text-align:right;">Subtotal Bs</th><th class="no-print">Acción</th></tr></thead>
                        <tbody id="cart-body"></tbody>
                    </table>
                    <div style="background: var(--blue); color: var(--white); padding: 25px; border-radius: 16px; margin-top: 25px; display: flex; justify-content: space-between; align-items: center;" class="no-print">
                        <div><h2 id="totBs" style="margin:0; font-size: 2rem;">0,00 Bs</h2><span id="totUsd" style="color:var(--accent)">0,00 $</span></div>
                        <button class="btn-ui btn-green" onclick="checkout(true)" style="padding: 15px 25px;">Cobrar e Imprimir 🖨️</button>
                    </div>
                </div>
            </div>

            <div id="fiao" class="module">
                <div class="card">
                    <div class="card-header">
                        <h3>Lista de Deudores</h3>
                        <div class="btn-group-top">
                            <button class="btn-ui btn-dark" onclick="descargarPDF('deudores')">📄 PDF</button>
                            <button class="btn-ui btn-red" onclick="resetDeudores()">Borrar Todo</button>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;" class="no-print">
                        <input type="text" id="fCli" placeholder="Nombre del Cliente" style="flex: 2;">
                        <input type="number" id="fMon" placeholder="Monto Bs" style="flex: 1;">
                        <button class="btn-ui btn-blue" onclick="saveFiao()">Guardar Deuda</button>
                    </div>
                    <table style="margin-top: 20px;">
                        <thead><tr><th>Cliente</th><th style="text-align:right;">Monto Bs</th><th style="text-align:center;">Acción</th></tr></thead>
                        <tbody id="f-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="caja" class="module">
                <div class="card">
                    <div class="card-header">
                        <h3>Reporte de Ventas</h3>
                        <div class="btn-group-top">
                            <button class="btn-ui btn-dark" onclick="descargarPDFCierre()">📄 PDF con Total</button>
                            <button class="btn-ui btn-red" onclick="resetDay()">Limpiar Cierre</button>
                        </div>
                    </div>
                    <table>
                        <thead><tr><th>Hora</th><th style="text-align:right;">Monto Bs</th></tr></thead>
                        <tbody id="cierre-body"></tbody>
                    </table>
                    <div style="text-align:right; margin-top:25px;">
                        <h1 id="cierre-total" style="margin:0; color:var(--blue);">0,00 Bs</h1>
                    </div>
                </div>
            </div>

            <div id="inv" class="module">
                <div class="card">
                    <h3>Registrar Producto</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                        <input type="text" id="iNom" placeholder="Nombre" style="grid-column: span 2;">
                        <input type="number" id="iBulto" placeholder="Bultos">
                        <input type="number" id="iUxb" placeholder="Und x Bulto">
                        <input type="number" id="iCostB" placeholder="Costo Bulto $">
                        <input type="number" id="iMargen" value="30" placeholder="% Ganancia">
                    </div>
                    <button class="btn-ui btn-blue" style="width: 100%;" onclick="registrarInventario()">Guardar en Inventario</button>
                </div>
                <div class="card">
                    <table>
                        <thead><tr><th>Producto</th><th>Existencia</th><th style="text-align:right;">P. Venta Bs</th><th>Acción</th></tr></thead>
                        <tbody id="lista-inv"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="print-area" style="display:none;"></div>

    <script>
        let TASA = parseFloat(localStorage.getItem('ht_tasa')) || 451.50;
        let currentUser = null;
        let db = JSON.parse(localStorage.getItem('ht_db')) || [];
        let sales = JSON.parse(localStorage.getItem('ht_sales')) || [];
        let deudores = JSON.parse(localStorage.getItem('ht_deudores')) || [];
        let cart = [];

        const fNum = (n) => n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        async function fetchTasaBCV() {
            try {
                const response = await fetch('https://dolarapi.com/v1/ve/dolares/oficial');
                const data = await response.json();
                if(data.promedio) {
                    TASA = parseFloat(data.promedio);
                    document.getElementById('tasa-input').value = TASA.toFixed(2);
                    localStorage.setItem('ht_tasa', TASA);
                    renderAll();
                }
            } catch (e) { console.log("Usando tasa manual"); }
        }

        function checkLogin() {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;
            if((u === "admin" && p === "hack2026") || (u === "vendedor" && p === "1234")) {
                currentUser = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-interface').style.display = 'flex';
                document.getElementById('tasa-input').value = TASA;
                renderAll();
                fetchTasaBCV();
            } else { alert("Datos incorrectos"); }
        }

        function renderAll() {
            // Inventario
            document.getElementById('lista-inv').innerHTML = db.map((p,i) => `
                <tr><td>${p.nom}</td><td>${p.totalUnd} und</td><td style="text-align:right;">${fNum(p.pVentaU * TASA)}</td>
                <td>${currentUser==='admin' ? `<button onclick="borrarProd(${i})" class="btn-ui btn-red" style="padding:4px 8px;">✖</button>` : ''}</td></tr>`).join('');
            
            // POS Selector
            document.getElementById('sel-pos').innerHTML = db.map((p,i) => `<option value="${i}">${p.nom} - $${fNum(p.pVentaU)}</option>`).join('');

            // Deudores
            document.getElementById('f-body').innerHTML = deudores.map((d, i) => `
                <tr><td>${d.cli}</td><td style="text-align:right;">${fNum(d.mon)} Bs</td>
                <td style="text-align:center;">${currentUser === 'admin' ? `<button onclick="borrarFiao(${i})" class="btn-ui btn-green" style="padding:5px 10px; font-size:0.75rem;">✅ Pagado</button>` : '---'}</td></tr>`).join('');

            // Cierre
            let tot = 0;
            document.getElementById('cierre-body').innerHTML = sales.map(s => { tot += s.m; return `<tr><td>${s.h}</td><td style="text-align:right;">${fNum(s.m)} Bs</td></tr>`; }).join('');
            document.getElementById('cierre-total').innerText = fNum(tot) + " Bs";
        }

        function registrarInventario() {
            const nom = document.getElementById('iNom').value;
            const bultos = parseInt(document.getElementById('iBulto').value) || 0;
            const uxb = parseInt(document.getElementById('iUxb').value) || 1;
            const costB = parseFloat(document.getElementById('iCostB').value);
            const marg = parseFloat(document.getElementById('iMargen').value);
            if(!nom || isNaN(costB)) return;
            const pVentaU = (costB / uxb) * (1 + (marg / 100));
            db.push({ nom, totalUnd: bultos * uxb, pVentaU });
            localStorage.setItem('ht_db', JSON.stringify(db));
            renderAll();
        }

        function addToCart() {
            const idx = document.getElementById('sel-pos').value;
            const p = db[idx];
            const cant = parseInt(document.getElementById('cant-pos').value) || 1;
            if(!p) return;
            if(p.totalUnd < cant) return alert("Sin stock suficiente");
            cart.push({ nom: p.nom, cant, sub: p.pVentaU * TASA * cant, id: idx });
            renderCart();
        }

        function renderCart() {
            let t = 0;
            document.getElementById('cart-body').innerHTML = cart.map((i, idx) => {
                t += i.sub;
                return `<tr><td>${i.nom}</td><td>${i.cant}</td><td style="text-align:right;">${fNum(i.sub)}</td><td class="no-print" onclick="cart.splice(${idx},1);renderCart()" style="color:var(--red);cursor:pointer;">✖</td></tr>`;
            }).join('');
            document.getElementById('totBs').innerText = fNum(t) + " Bs";
            document.getElementById('totUsd').innerText = fNum(t/TASA) + " $";
        }

        function checkout(print) {
            const t = cart.reduce((a, b) => a + b.sub, 0);
            if(t <= 0) return;

            if(print) {
                const pArea = document.getElementById('print-area');
                const fecha = new Date().toLocaleDateString();
                const hora = new Date().toLocaleTimeString();
                pArea.innerHTML = `
                    <div style="text-align:center;">
                        <strong>SISTEMAS DE VENTAS POS</strong><br>
                        RIF: 14709674-3<br>
                        ${fecha} | ${hora}<hr>
                    </div>
                    ${cart.map(i => `<div>${i.nom} x${i.cant}<br>Sub: ${fNum(i.sub)} Bs</div>`).join('<br>')}
                    <hr>
                    <div style="text-align:right;"><strong>TOTAL: ${fNum(t)} Bs</strong><br>Ref: ${fNum(t/TASA)} $</div>
                    <br><div style="text-align:center;">¡Gracias por su compra!</div>
                `;
                window.print();
            }

            sales.push({ h: new Date().toLocaleTimeString(), m: t });
            cart.forEach(c => { if(db[c.id]) db[c.id].totalUnd -= c.cant; });
            localStorage.setItem('ht_db', JSON.stringify(db));
            localStorage.setItem('ht_sales', JSON.stringify(sales));
            cart = []; renderCart(); renderAll();
        }

        function descargarPDFCierre() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let total = sales.reduce((a, b) => a + b.m, 0);
            doc.text("REPORTE DE VENTAS", 15, 20);
            doc.setFontSize(10);
            doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 15, 27);
            const filas = sales.map(s => [s.h, `${fNum(s.m)} Bs`]);
            filas.push([{ content: 'TOTAL ACUMULADO DEL DÍA', styles: { fontStyle: 'bold', fillColor: [240, 240, 240] } }, 
                        { content: `${fNum(total)} Bs`, styles: { fontStyle: 'bold', fillColor: [240, 240, 240] } }]);
            doc.autoTable({ startY: 35, head: [['Hora', 'Monto Transacción']], body: filas, theme: 'grid' });
            doc.save("Cierre_HackTech.pdf");
        }

        function saveFiao() {
            const cli = document.getElementById('fCli').value;
            const mon = parseFloat(document.getElementById('fMon').value);
            if(!cli || isNaN(mon)) return;
            deudores.push({ cli, mon });
            localStorage.setItem('ht_deudores', JSON.stringify(deudores));
            renderAll();
            document.getElementById('fCli').value = '';
            document.getElementById('fMon').value = '';
        }

        function borrarFiao(i) { if(confirm("¿Marcar como pagado?")) { deudores.splice(i,1); localStorage.setItem('ht_deudores', JSON.stringify(deudores)); renderAll(); } }
        function resetDay() { if(confirm("¿Limpiar todo el cierre?")) { sales=[]; localStorage.setItem('ht_sales', "[]"); renderAll(); } }
        function resetDeudores() { if(confirm("¿Borrar todos los deudores?")) { deudores=[]; localStorage.setItem('ht_deudores', "[]"); renderAll(); } }
        function borrarProd(i) { if(confirm("¿Eliminar producto?")) { db.splice(i,1); localStorage.setItem('ht_db', JSON.stringify(db)); renderAll(); } }

        function showTab(e, id) {
            if(id==='inv' && currentUser!=='admin') return alert("Acceso restringido a Administrador");
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
            renderAll();
        }
    </script>
</body>
</html>
